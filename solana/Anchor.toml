[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
verity_worldcup = "8t3WbL4A91QGdUwdz9EAAW1yCtyVyEmmMBGRFcG89a21"
mock_txline = "GjEDdDHNoUK52x73SBiMyfz5zn8BtsLuPE5YFfCW2U8T"

[programs.devnet]
verity_worldcup = "8t3WbL4A91QGdUwdz9EAAW1yCtyVyEmmMBGRFcG89a21"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Offline tests build verity_worldcup with the `localnet` feature so its
# settlement CPI targets the local mock-txline program (deterministic, no live
# TxLINE data needed). Drop the feature for real devnet builds.
[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899
